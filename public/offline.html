<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Daton ESG</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        max-width: 420px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
      }
      p {
        margin: 0 0 16px;
        color: #475569;
      }
      a {
        display: inline-block;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #16a34a;
        color: #166534;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sem conexão com a internet</h1>
      <p>Não foi possível carregar esta página agora. Verifique sua conexão e tente novamente.</p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
